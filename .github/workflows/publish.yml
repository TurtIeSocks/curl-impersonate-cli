name: Publish to crates.io

# Publishes the crate when a version tag is pushed, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# Requires the `CARGO_REGISTRY_TOKEN` repository secret (a crates.io API token).
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*' # v0.1.0, v1.2.3, v1.2.3-rc.1, …

# Least privilege: publishing only reads the repo and pushes to crates.io.
permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      # Refuse to publish if the tag and the Cargo.toml version disagree — the
      # crates.io release must match the tag that triggered it.
      - name: Verify tag matches Cargo.toml version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          crate="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          echo "tag=v${tag}  crate=${crate}"
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag v${tag} does not match Cargo.toml version ${crate}"
            exit 1
          fi

      # Same gates as CI, so a tag can't ship unformatted / warning / failing code
      # even if it was pushed without a prior PR run.
      - name: Check
        run: |
          cargo fmt --all --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --all-features

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
