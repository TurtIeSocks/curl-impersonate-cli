name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Cancel superseded in-flight runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # fmt + clippy + tests for the default feature set.
  check:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test --all-targets

  # The `download` feature must stay green too. It pulls in reqwest/flate2/tar/
  # dirs, so it is built and linted separately from the default set.
  download-feature:
    name: download feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (download)
        run: cargo build --features download

      - name: Clippy (download)
        run: cargo clippy --features download --all-targets -- -D warnings

  # The `mcp` feature builds the MCP server binary (rmcp SDK + transitive deps),
  # so it is built, linted, and tested separately from the default set.
  mcp-feature:
    name: mcp feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (mcp)
        run: cargo build --features mcp

      - name: Clippy (mcp)
        run: cargo clippy --features mcp --all-targets -- -D warnings

      - name: Tests (mcp)
        run: cargo test --features mcp --bin curl-impersonate-mcp

  # Confirm the crate still builds on its declared MSRV (Cargo.toml
  # `rust-version`). Nice-to-have; keep in sync with that field.
  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (default features)
        run: cargo build

      - name: Build (download feature)
        run: cargo build --features download
